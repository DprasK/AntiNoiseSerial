name=AntiNoiseSerial
version=1.0.0
author=Arduino Developer
maintainer=Arduino Developer <developer@example.com>
sentence=A library to filter out unreadable serial noise (UART) and perform MySQL-like pattern matching.
paragraph=This library automatically filters out non-readable characters (electrical noise) from Arduino serial communications. It provides advanced string pattern matching using MySQL LIKE syntax (supporting % and _ wildcards) and an optional smart spacing feature when data corruption occurs.
category=Communication
